<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Preinstall Command Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#080d17;
  --surface:#0d1526;
  --surface2:#111c30;
  --surface3:#162036;
  --muted:#5a6a85;
  --muted2:#7a8fa8;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --accent-glow:rgba(59,130,246,0.18);
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --highlight:#fbbf24;
  --text:#dde8f5;
  --text2:#a8bdd4;
  --border:rgba(59,130,246,0.12);
  --border2:rgba(255,255,255,0.06);
  --shadow:rgba(0,0,0,0.5);
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}

/* LIGHT MODE */
:root.light-mode{
  --bg:#f5f7fa;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --surface3:#eef2f7;
  --muted:#64748b;
  --muted2:#475569;
  --accent:#3b82f6;
  --accent2:#2563eb;
  --accent-glow:rgba(59,130,246,0.08);
  --green:#16a34a;
  --red:#ef4444;
  --amber:#d97706;
  --highlight:#facc15;
  --text:#0f172a;
  --text2:#334155;
  --border:rgba(59,130,246,0.08);
  --border2:rgba(0,0,0,0.08);
  --shadow:rgba(0,0,0,0.08);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:32px 24px;
  display:flex;
  justify-content:center;
  transition:background .3s ease,color .3s ease;
  background-image:
    linear-gradient(var(--border2) 1px, transparent 1px),
    linear-gradient(90deg, var(--border2) 1px, transparent 1px);
  background-size:40px 40px;
}

.wrap{
  max-width:1060px;
  width:100%;
  display:grid;
  grid-template-columns:1fr 460px;
  gap:24px;
  align-items:start;
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:24px;
  border:1px solid var(--border2);
  box-shadow:0 4px 40px var(--shadow);
  position:relative;
  overflow:hidden;
  transition:all .3s ease;
}

.card::before{
  content:"";
  position:absolute;
  top:0; left:0; right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0.5;
}

.card.notes-clear{
  background:transparent;
  border:none;
  box-shadow:none;
  padding:12px 0 0;
}
.card.notes-clear::before{display:none}

.card-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.card-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:var(--accent-glow);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

h1{font-size:18px;font-weight:800;color:var(--text)}
h2{font-size:15px;font-weight:700;color:var(--text)}

.hint{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted2);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:14px;
}

.textarea-wrap{position:relative;margin-bottom:14px}

textarea{
  width:100%;
  height:420px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;
  outline:none;
  color:var(--text);
  font-family:var(--mono);
  font-size:12.5px;
  padding:14px;
  resize:none;
  line-height:1.8;
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  font-family:var(--sans);
  font-weight:600;
  font-size:13px;
  padding:9px 18px;
  border-radius:10px;
  border:0;
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}

.btn-ghost{
  background:var(--surface3);
  border:1px solid var(--border2);
  color:var(--muted2);
}

.output-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-height:500px;
  overflow-y:auto;
}

.line{
  display:flex;
  gap:8px;
  align-items:center;
  background:var(--surface2);
  border:1px solid var(--border2);
  padding:10px 10px 10px 30px;
  border-radius:11px;
  position:relative;
}

.cmd{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--text2);
  flex:1;
}

.meta{
  display:flex;
  gap:8px;
}

.copy-btn{
  background:var(--surface3);
  border:1px solid var(--border2);
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--muted2);
}

.copy-btn.highlighted{
  background:var(--highlight);
  color:#000;
}

.warn{
  position:absolute;
  left:8px;
}

.rules{
  font-size:12px;
  color:var(--muted);
  margin-top:12px;
  padding:10px 12px;
  background:var(--surface2);
  border-radius:8px;
}

.status{
  margin-top:10px;
  color:var(--green);
}

.empty-state{
  padding:48px 0;
  text-align:center;
  color:var(--muted);
}
</style>
</head>
<body>

<div id="globalTooltip">
  <ul>
    <li>Subdomains</li>
    <li>RDNS</li>
    <li>no need Ipv6</li>
  </ul>
</div>

<div class="wrap">

  <div class="card">
    <div class="card-header">
      <div class="card-icon">⚡</div>
      <h1>Preinstall Command Generator</h1>
    </div>

    <div class="hint">
      Paste lines as: <code>password group/server count ip1, ip2…</code>
    </div>

    <div class="textarea-wrap">
      <textarea id="input"></textarea>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="generate">Generate</button>
      <button class="btn btn-ghost" id="clear">Clear</button>
      <button class="btn btn-ghost" id="pasteExample">Paste example</button>
    </div>

    <div class="rules">
      Each line must contain password, group/server, count and optional IPs.
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="right-col">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">📋</div>
        <h2>Generated Commands</h2>
      </div>

      <div id="outputList" class="output-list">
        <div class="empty-state">Paste your input and click Generate</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= THEME SYSTEM ================= */

function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light-mode');
  } else {
    document.documentElement.classList.remove('light-mode');
  }
}

function checkParentTheme() {
  try {
    if (window.parent && window.parent !== window) {
      const isLight = window.parent.document.body.classList.contains('light-mode');
      applyTheme(isLight ? 'light' : 'dark');
      return true;
    }
  } catch {
    const saved = localStorage.getItem('theme') || 'dark';
    applyTheme(saved);
  }
}

checkParentTheme();

window.addEventListener('message', (event) => {
  if (event.data?.theme) {
    applyTheme(event.data.theme);
    localStorage.setItem('theme', event.data.theme);
  }
});

setInterval(checkParentTheme, 200);
window.addEventListener('focus', checkParentTheme);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkParentTheme();
});
window.addEventListener('mouseenter', checkParentTheme);
window.addEventListener('click', checkParentTheme);

/* ================= ORIGINAL JS ================= */

const inputEl  = document.getElementById("input")
const outList  = document.getElementById("outputList")
const statusEl = document.getElementById("status")

function parseLines(text){
  const lines=text.split(/\r?\n/), results=[]
  lines.forEach(line=>{
    if(!line.trim()) return
    results.push(line)
  })
  return results
}

document.getElementById("generate").addEventListener("click",()=>{
  const results=parseLines(inputEl.value)
  outList.innerHTML=results.map(r=>`<div class="line"><div class="cmd">${r}</div></div>`).join("")
  statusEl.textContent=`Generated ${results.length} command(s)`
})

document.getElementById("clear").addEventListener("click",()=>{
  inputEl.value=""
  outList.innerHTML=`<div class="empty-state">Paste your input and click Generate</div>`
  statusEl.textContent=""
})

document.getElementById("pasteExample").addEventListener("click",()=>{
  inputEl.value="password1\tvistas06/server1\t5"
})
</script>
</body>
</html>
