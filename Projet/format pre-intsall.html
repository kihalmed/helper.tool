<style>
:root{
  --bg:#080d17;
  --surface:#0d1526;
  --surface2:#111c30;
  --surface3:#162036;
  --muted:#5a6a85;
  --muted2:#7a8fa8;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --accent-glow:rgba(59,130,246,0.18);
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --highlight:#fbbf24;
  --text:#dde8f5;
  --text2:#a8bdd4;
  --border:rgba(59,130,246,0.12);
  --border2:rgba(255,255,255,0.06);
  --shadow:rgba(0,0,0,0.5);
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:32px 24px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

.wrap{
  max-width:1060px;
  width:100%;
  display:grid;
  grid-template-columns:1fr 460px;
  gap:24px;
  align-items:start;
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:24px;
  border:1px solid var(--border2);
  box-shadow:0 4px 40px var(--shadow);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0.5;
}

.card.notes-clear{
  background:transparent;
  border:none;
  box-shadow:none;
  padding:12px 0 0;
}

.card.notes-clear::before{
  display:none;
}

.card-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.card-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:var(--accent-glow);
  border:1px solid rgba(59,130,246,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

h1{
  font-size:18px;
  font-weight:800;
  color:var(--text);
}

h2{
  font-size:15px;
  font-weight:700;
  color:var(--text);
}

.hint{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted2);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:14px;
}

.textarea-wrap{
  position:relative;
  margin-bottom:14px;
}

textarea{
  width:100%;
  height:420px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;
  outline:none;
  color:var(--text);
  font-family:var(--mono);
  font-size:12.5px;
  padding:14px;
  resize:none;
  line-height:1.8;
}

textarea:focus{
  border-color:rgba(59,130,246,0.4);
  box-shadow:0 0 0 3px rgba(59,130,246,0.07);
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  font-family:var(--sans);
  font-weight:600;
  font-size:13px;
  padding:9px 18px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  transition:all .2s;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}

.btn-ghost{
  background:var(--surface3);
  border:1px solid var(--border2);
  color:var(--muted2);
}

.btn:hover{
  opacity:0.9;
}

.rules{
  font-size:12px;
  color:var(--muted);
  margin-top:12px;
  line-height:1.7;
  padding:10px 12px;
  background:var(--surface2);
  border-radius:8px;
}

.status{
  font-size:12px;
  color:var(--green);
  margin-top:10px;
}

.right-col{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.output-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line{
  display:flex;
  gap:8px;
  align-items:center;
  background:var(--surface2);
  border:1px solid var(--border2);
  padding:10px;
  border-radius:11px;
}

.cmd{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--text2);
  flex:1;
}

.copy-btn{
  background:var(--surface3);
  border:1px solid var(--border2);
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--muted2);
}

.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 0;
  color:var(--muted);
  gap:10px;
}

.notes-title{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:10px;
}

.notes-list{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:7px;
}

.notes-list li{
  font-size:12.5px;
  color:var(--muted2);
}
</style>
</head>

</body>
</html>
